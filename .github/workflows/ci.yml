name: CI

on:
  push:
    branches: [master, dev]
    paths-ignore:
      - '.claude/**'
      - 'docs/**'
      - '*.md'
      - '.gitignore'
      - 'LICENSE'
  pull_request:
    branches: [master, dev]
    paths-ignore:
      - '.claude/**'
      - 'docs/**'
      - '*.md'
      - '.gitignore'
      - 'LICENSE'

env:
  SECRETS_PATH: composeApp/src/commonMain/kotlin/com/andriybobchuk/mooney/core/data/Secrets.kt

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint, Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - name: Generate Secrets.kt
        run: |
          cat > $SECRETS_PATH <<'KOTLIN'
          package com.andriybobchuk.mooney.core.data
          object Secrets {
              const val EXCHANGE_RATE_API_KEY = "${{ secrets.EXCHANGE_RATE_API_KEY }}"
          }
          KOTLIN
      - run: ./gradlew detekt :composeApp:assembleDebug :composeApp:testDebugUnitTest --build-cache
      - run: ./gradlew koverHtmlReport
        if: success()
      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: coverage-report
          path: composeApp/build/reports/kover/html/

  deploy-testflight:
    name: Deploy to TestFlight
    runs-on: macos-26
    needs: check
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4

      - name: Generate Secrets.kt
        run: |
          cat > $SECRETS_PATH <<'KOTLIN'
          package com.andriybobchuk.mooney.core.data
          object Secrets {
              const val EXCHANGE_RATE_API_KEY = "${{ secrets.EXCHANGE_RATE_API_KEY }}"
          }
          KOTLIN

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: iosApp

      - name: Deploy to TestFlight
        working-directory: iosApp
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
        run: bundle exec fastlane beta

  deploy-play:
    name: Deploy to Google Play
    runs-on: ubuntu-latest
    needs: check
    # Only run on master pushes. Also requires the MOONEY_KEYSTORE_BASE64 secret
    # to be set — until first manual upload to Play Console is done, leave the
    # secret unset and this job will skip cleanly.
    if: github.ref == 'refs/heads/master' && github.event_name == 'push' && vars.PLAY_DEPLOY_ENABLED == 'true'
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4

      - name: Generate Secrets.kt
        run: |
          cat > $SECRETS_PATH <<'KOTLIN'
          package com.andriybobchuk.mooney.core.data
          object Secrets {
              const val EXCHANGE_RATE_API_KEY = "${{ secrets.EXCHANGE_RATE_API_KEY }}"
          }
          KOTLIN

      - name: Decode upload keystore
        run: echo "${{ secrets.MOONEY_KEYSTORE_BASE64 }}" | base64 --decode > $RUNNER_TEMP/mooney-upload-key.jks

      - name: Build signed release AAB
        env:
          MOONEY_KEYSTORE_FILE: ${{ runner.temp }}/mooney-upload-key.jks
          MOONEY_KEYSTORE_PASSWORD: ${{ secrets.MOONEY_KEYSTORE_PASSWORD }}
          MOONEY_KEY_ALIAS: ${{ secrets.MOONEY_KEY_ALIAS }}
          MOONEY_KEY_PASSWORD: ${{ secrets.MOONEY_KEY_PASSWORD }}
        run: ./gradlew :composeApp:bundleRelease --build-cache

      - name: Upload to Play Console (Internal Testing)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.andriybobchuk.mooney
          releaseFiles: composeApp/build/outputs/bundle/release/composeApp-release.aab
          track: internal
          status: completed
