name: CI

on:
  push:
    branches: [master, dev]
    paths-ignore:
      - '.claude/**'
      - 'docs/**'
      - '*.md'
      - '.gitignore'
      - 'LICENSE'
  pull_request:
    branches: [master, dev]
    paths-ignore:
      - '.claude/**'
      - 'docs/**'
      - '*.md'
      - '.gitignore'
      - 'LICENSE'

env:
  SECRETS_PATH: composeApp/src/commonMain/kotlin/com/andriybobchuk/mooney/core/data/Secrets.kt

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint, Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - name: Generate Secrets.kt
        run: |
          cat > $SECRETS_PATH <<'KOTLIN'
          package com.andriybobchuk.mooney.core.data
          object Secrets {
              const val EXCHANGE_RATE_API_KEY = "${{ secrets.EXCHANGE_RATE_API_KEY }}"
          }
          KOTLIN
      - run: ./gradlew detekt :composeApp:assembleDebug :composeApp:testDebugUnitTest --build-cache
      - run: ./gradlew koverHtmlReport
        if: success()
      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: coverage-report
          path: composeApp/build/reports/kover/html/

  deploy-testflight:
    name: Deploy to TestFlight
    runs-on: macos-26
    needs: check
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4

      - name: Generate Secrets.kt
        run: |
          cat > $SECRETS_PATH <<'KOTLIN'
          package com.andriybobchuk.mooney.core.data
          object Secrets {
              const val EXCHANGE_RATE_API_KEY = "${{ secrets.EXCHANGE_RATE_API_KEY }}"
          }
          KOTLIN

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: iosApp

      - name: Deploy to TestFlight
        working-directory: iosApp
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
        run: bundle exec fastlane beta
