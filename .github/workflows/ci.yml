name: CI

on:
  push:
    branches: [master, dev]
    paths-ignore:
      - '.claude/**'
      - 'docs/**'
      - '*.md'
      - '.gitignore'
      - 'LICENSE'
  pull_request:
    branches: [master, dev]
    paths-ignore:
      - '.claude/**'
      - 'docs/**'
      - '*.md'
      - '.gitignore'
      - 'LICENSE'

env:
  SECRETS_PATH: composeApp/src/commonMain/kotlin/com/andriybobchuk/mooney/core/data/Secrets.kt

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint, Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - name: Generate Secrets.kt
        run: |
          cat > $SECRETS_PATH <<'KOTLIN'
          package com.andriybobchuk.mooney.core.data
          object Secrets {
              const val EXCHANGE_RATE_API_KEY = "${{ secrets.EXCHANGE_RATE_API_KEY }}"
              const val FIREBASE_PROJECT_ID = "mooney-39533"
          }
          KOTLIN
      - run: ./gradlew detekt :composeApp:assembleDebug :composeApp:testDebugUnitTest --build-cache
      - run: ./gradlew koverHtmlReport
        if: success()
      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: coverage-report
          path: composeApp/build/reports/kover/html/

  maestro-android-smoke:
    name: Maestro E2E (smoke)
    # `continue-on-error: true` while we bed the suite in — an emulator flake
    # shouldn't block merges during rollout. Remove once flake rate is <5%
    # over two weeks and wire the /ship gate to require this job green.
    continue-on-error: true
    runs-on: ubuntu-latest
    needs: check
    timeout-minutes: 25
    # KVM needs elevated /dev/kvm access on the runner. This is the pattern
    # required by reactivecircus/android-emulator-runner on ubuntu-latest.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - name: Generate Secrets.kt
        run: |
          cat > $SECRETS_PATH <<'KOTLIN'
          package com.andriybobchuk.mooney.core.data
          object Secrets {
              const val EXCHANGE_RATE_API_KEY = "${{ secrets.EXCHANGE_RATE_API_KEY }}"
              const val FIREBASE_PROJECT_ID = "mooney-39533"
          }
          KOTLIN
      - name: Assemble e2e APK
        run: ./gradlew :composeApp:assembleE2e --build-cache
      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH
      - name: Run smoke suite on Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          force-avd-creation: false
          emulator-boot-timeout: 900
          disable-animations: true
          script: |
            adb wait-for-device
            adb install -r composeApp/build/outputs/apk/e2e/composeApp-e2e.apk
            mkdir -p maestro-debug
            maestro test .maestro/smoke.yaml --format junit --output smoke-report.xml --debug-output maestro-debug
      - name: Upload Maestro report + traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-smoke-report
          path: |
            smoke-report.xml
            maestro-debug/**/*
            ~/.maestro/tests/**/*
          if-no-files-found: warn

  deploy-testflight:
    name: Deploy to TestFlight
    runs-on: macos-26
    needs: check
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    # 45 min — the 26.07.02 release hit the 30-min cap during Kotlin/Native
    # framework compile (~27 min alone), leaving no time for xcodebuild +
    # upload. Bumped so the Firebase-pods + KMP framework combo has room to
    # breathe on a cold cache.
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4

      - name: Generate Secrets.kt
        run: |
          cat > $SECRETS_PATH <<'KOTLIN'
          package com.andriybobchuk.mooney.core.data
          object Secrets {
              const val EXCHANGE_RATE_API_KEY = "${{ secrets.EXCHANGE_RATE_API_KEY }}"
              const val FIREBASE_PROJECT_ID = "mooney-39533"
          }
          KOTLIN

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: iosApp

      - name: Deploy to TestFlight
        working-directory: iosApp
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
        run: bundle exec fastlane beta

  deploy-play:
    name: Deploy to Google Play
    runs-on: ubuntu-latest
    needs: check
    # Only run on master pushes. Also requires the MOONEY_KEYSTORE_BASE64 secret
    # to be set — until first manual upload to Play Console is done, leave the
    # secret unset and this job will skip cleanly.
    if: github.ref == 'refs/heads/master' && github.event_name == 'push' && vars.PLAY_DEPLOY_ENABLED == 'true'
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4

      - name: Generate Secrets.kt
        run: |
          cat > $SECRETS_PATH <<'KOTLIN'
          package com.andriybobchuk.mooney.core.data
          object Secrets {
              const val EXCHANGE_RATE_API_KEY = "${{ secrets.EXCHANGE_RATE_API_KEY }}"
              const val FIREBASE_PROJECT_ID = "mooney-39533"
          }
          KOTLIN

      - name: Decode upload keystore
        run: echo "${{ secrets.MOONEY_KEYSTORE_BASE64 }}" | base64 --decode > $RUNNER_TEMP/mooney-upload-key.jks

      - name: Build signed release AAB
        env:
          MOONEY_KEYSTORE_FILE: ${{ runner.temp }}/mooney-upload-key.jks
          MOONEY_KEYSTORE_PASSWORD: ${{ secrets.MOONEY_KEYSTORE_PASSWORD }}
          MOONEY_KEY_ALIAS: ${{ secrets.MOONEY_KEY_ALIAS }}
          MOONEY_KEY_PASSWORD: ${{ secrets.MOONEY_KEY_PASSWORD }}
        run: ./gradlew :composeApp:bundleRelease --build-cache

      - name: Upload to Play Console (Internal Testing)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.andriybobchuk.mooney
          releaseFiles: composeApp/build/outputs/bundle/release/composeApp-release.aab
          track: internal
          status: completed
