# Delete-transaction balance-math guard.
#
# When a transaction is deleted, DeleteTransactionUseCase must reverse
# its effect on the account balance. Failure mode this catches: soft-
# delete without balance reversal — transaction disappears from the
# list but its debit stays applied. Users would slowly bleed accuracy.
#
# Precondition: mid_size_user fixture has a $500 internal transfer from
# Checking → Savings. We long-press to open the action sheet, tap the
# tagged Delete row (opens confirm), tap Confirm Delete, then verify
# both balances rolled back.

appId: com.andriybobchuk.mooney
tags:
  - transactions
  - balance-math
---
- runFlow:
    file: ../shared/launch_seeded.yaml
    env:
      FIXTURE: "mid_size_user"
      WIPE_DB: "true"

- assertVisible: "Transactions"

# Long-press the transfer row (id 9 by fixture insertion order).
- longPressOn:
    id: "txn_row_9"

# Action sheet is up. Tap Delete → opens confirm sheet.
- tapOn:
    id: "txn_action_delete"

# Confirm.
- tapOn:
    id: "txn_confirm_delete"

# Precondition balances were: Checking $3,500, Savings $15,000 after
# the historical $500 transfer. Reversing it should restore Checking
# by $500 to $4,000 and drop Savings by $500 to $14,500.
- tapOn:
    id: "nav_accounts"
- assertVisible: "4,000"
- assertVisible: "14,500"
