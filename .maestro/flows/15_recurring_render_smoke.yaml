# Recurring transactions rendering + FAB smoke.
#
# Fixture: recurring_ready — 1 account, 1 monthly recurring ("Rent",
# $1,500). Verifies:
#   - RecurringTransactionsScreen actually renders the seeded recurring.
#   - The Add FAB is present and tappable, opens the add-recurring sheet.
#   - No crash when the sheet opens (the add-recurring sheet has several
#     text-field composables and the currency+account pickers).
#
# What we protect: a regression that fails to load recurring transactions
# from the DAO (e.g. dispatcher error) would render an empty list here.

appId: com.andriybobchuk.mooney
tags:
  - recurring
---
- runFlow:
    file: ../shared/launch_seeded.yaml
    env:
      FIXTURE: "recurring_ready"
      WIPE_DB: "true"

- assertVisible: "Transactions"
- tapOn: "Recurring"

# The seeded Rent recurring renders.
- assertVisible: "Rent"

# FAB is present and dismisses the sheet without a crash.
- tapOn:
    id: "fab_add_recurring"

# Sheet should show — we don't complete the add flow here (no testTags on
# the recurring sheet fields yet); just prove it opens and closes without
# crashing.
- back
- assertVisible: "Rent"
