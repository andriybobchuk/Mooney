# Smoke-tier Mooney E2E — runs on every PR to `dev`.
#
# Trimmed to the two flows that reliably pass on the GitHub-hosted KVM
# emulator today:
#
#   - 01_seeded_launch_smoke: proves the E2eBootstrap seam is working
#     (fixture data reaches the UI, bottom nav navigates).
#   - 24_bottom_nav_walk: exercises every top-level screen for at least
#     one non-crashing composition.
#
# Flow 02 (add-transaction balance math) and other flows that interact
# with Compose bottom-sheet text fields are currently kept in
# `full.yaml` only — Maestro's `inputText` against a Compose
# `BasicTextField` inside a `ModalBottomSheet` on the emulator has an
# unresolved race with the sheet's auto-focus that produces silent
# failures. Investigation is deferred to a session with an interactive
# emulator + `maestro studio` for real-time hierarchy inspection.
#
# Run locally:
#   ./gradlew :composeApp:assembleE2e
#   adb install -r composeApp/build/outputs/apk/e2e/composeApp-e2e.apk
#   maestro test .maestro/smoke.yaml

appId: com.andriybobchuk.mooney
---
- runFlow: flows/01_seeded_launch_smoke.yaml
- runFlow: flows/24_bottom_nav_walk.yaml
