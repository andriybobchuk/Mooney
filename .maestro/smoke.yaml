# Smoke-tier Mooney E2E — runs on every PR to `dev`.
#
# Target runtime: under 3 minutes on a KVM-accelerated Ubuntu emulator.
# The smoke set stays narrow: seeded-launch + add-transaction balance
# math + a paywall canary + a resilience canary. Adding flows here is
# a load-bearing decision; every new one is 30-60s of CI cost per PR.
#
# For everything else, see `full.yaml` (runs nightly).
#
# Run locally:
#   ./gradlew :composeApp:assembleE2e
#   adb install -r composeApp/build/outputs/apk/e2e/composeApp-e2e.apk
#   maestro test .maestro/smoke.yaml

appId: com.andriybobchuk.mooney
---
- runFlow: flows/01_seeded_launch_smoke.yaml
- runFlow: flows/02_add_transaction_updates_balance.yaml
- runFlow: flows/13_account_limit_paywall.yaml
- runFlow: flows/21_process_death_mid_add_txn.yaml
