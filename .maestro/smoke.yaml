# Smoke-tier Mooney E2E — runs on every PR to `dev`.
#
# Composed of tap-only flows that reliably pass on the GitHub-hosted
# KVM emulator. Text-input flows (add-transaction, transfer, etc.) run
# in `full.yaml` only until the `inputText`-vs-`BasicTextField`-in-
# `ModalBottomSheet` race is root-caused with an interactive emulator.
#
#   - 01_seeded_launch_smoke: fixture data reaches the UI.
#   - 04_delete_transaction: balance math via long-press + confirm.
#   - 09_multi_currency_net_worth: StubExchangeRateProvider math + Assets tab.
#   - 24_bottom_nav_walk: every top-level screen renders.
#
# Target: <5 min end-to-end. Adding new flows here is a load-bearing
# decision — every one is 30-60s of CI cost per PR.
#
# Run locally:
#   ./gradlew :composeApp:assembleE2e
#   adb install -r composeApp/build/outputs/apk/e2e/composeApp-e2e.apk
#   maestro test .maestro/smoke.yaml

appId: com.andriybobchuk.mooney
---
- runFlow: flows/01_seeded_launch_smoke.yaml
- runFlow: flows/04_delete_transaction_reverses_balance.yaml
- runFlow: flows/09_multi_currency_net_worth.yaml
- runFlow: flows/24_bottom_nav_walk.yaml
