build:
  maxIssues: 0
  excludeCorrectable: false

complexity:
  LongMethod:
    threshold: 100
    ignoreAnnotated:
      - "Composable"
  LongParameterList:
    functionThreshold: 10
    constructorThreshold: 12
    ignoreAnnotated:
      - "Composable"
  TooManyFunctions:
    thresholdInFiles: 30
    thresholdInClasses: 25
    thresholdInInterfaces: 20
  NestedBlockDepth:
    threshold: 6
  CyclomaticComplexMethod:
    threshold: 25
    ignoreAnnotated:
      - "Composable"

exceptions:
  SwallowedException:
    active: false
  TooGenericExceptionCaught:
    active: true
    exceptionNames:
      - "ArrayIndexOutOfBoundsException"
      - "Error"
      - "IllegalMonitorStateException"
      - "IndexOutOfBoundsException"
      - "NullPointerException"
      - "RuntimeException"

naming:
  FunctionNaming:
    active: true
    functionPattern: "[a-zA-Z][a-zA-Z0-9]*"
    excludeClassPattern: ".*Test"
    ignoreAnnotated:
      - "Composable"
  TopLevelPropertyNaming:
    active: true
    constantPattern: "[A-Z][A-Za-z0-9_]*|[a-z][a-zA-Z0-9]*"
  MatchingDeclarationName:
    active: false
  VariableNaming:
    active: true
    variablePattern: "[a-z][A-Za-z0-9]*|_[a-zA-Z][A-Za-z0-9]*"

style:
  MagicNumber:
    active: false
  WildcardImport:
    active: false
  MaxLineLength:
    active: false
  ReturnCount:
    max: 4
  UnusedImports:
    active: false
  UnusedPrivateMember:
    active: false
  UnusedParameter:
    active: false
  UnusedPrivateProperty:
    active: false
  NewLineAtEndOfFile:
    active: false
  ForbiddenComment:
    active: false
  UseDataClass:
    active: false

empty-blocks:
  EmptyFunctionBlock:
    active: true
    ignoreOverridden: true
  EmptyCatchBlock:
    active: true
    allowedExceptionNameRegex: "_|(ignore|expected).*"

potential-bugs:
  UnsafeCast:
    active: true
  UnconditionalJumpStatementInLoop:
    active: true
